<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latin-American Flags Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>

<style>

  #progress {
    margin: 0;
  }

  /* Moves quiz closer to page center */
  #actual_quiz {
    top: 8vh;
  }

</style>

<body>

  <!--Tells Javascript what questions to show and how many questions there are for this particular quiz.-->
  <option id="identifier" value="latam"></option>
  
  <h1>Latin-American Flags Quiz</h1>
  <hr>

  <div id="actual_quiz">
    
    <!--A container for the main content of the quiz.-->
    <div id="qmo">
      <h2 id="question"></h2>
    </div>

    <!--Shows user how much of the quiz they have completed.-->
    <div id="progress">
      <b><p id="progress_fraction"></p></b>
      <b><p id="progress_percent"></p></b>
    </div>

  </div>

  <!--Displays the quiz results after all questions have been answered.-->
  <div id="results_container">
    <p id="results_text"></p>
    <a href="latam.html">Retake Quiz</a>
    <a href="index.html">Take Another Quiz</a>
  </div>

  <script src="script.js"></script>

</body>

</html>
